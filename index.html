<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raymon Trading Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17; --bg2: #0f1629; --bg3: #131b2e; --border: #1e293b; --border2: #2d3a52;
            --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
            --green: #10b981; --green-bg: rgba(16,185,129,0.12); --green-border: rgba(16,185,129,0.3);
            --red: #ef4444; --red-bg: rgba(239,68,68,0.12); --red-border: rgba(239,68,68,0.3);
            --yellow: #f59e0b; --yellow-bg: rgba(245,158,11,0.12); --yellow-border: rgba(245,158,11,0.3);
            --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.12); --blue-border: rgba(59,130,246,0.3);
            --cyan: #06b6d4; --cyan-bg: rgba(6,182,212,0.12); --purple: #8b5cf6; --purple-bg: rgba(139,92,246,0.12);
            --orange: #f97316; --orange-bg: rgba(249,115,22,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; line-height: 1.5; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100dvh; width: 100%; }

        /* === HEADER === */
        .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 16px 0; flex-shrink: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .logo { font-weight: 800; font-size: 15px; letter-spacing: 1.5px; color: var(--cyan); }
        .pulse-dot { display: inline-block; width: 7px; height: 7px; background: var(--green); border-radius: 50%; margin-left: 6px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .timestamp { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
        .equity-badge { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--green); }
        .header-ticker-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        .ticker-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 4px; text-align: center; }
        .ticker-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; }
        .ticker-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }
        .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--text2); }

        /* === TABS === */
        .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; padding: 8px 14px; font-size: 11px; font-weight: 600; color: var(--text3); background: none; border: none; cursor: pointer; white-space: nowrap; position: relative; letter-spacing: 0.3px; transition: color 0.2s; }
        .tab-btn.active { color: var(--cyan); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--cyan); }
        .tab-btn .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 16px; height: 16px; padding: 0 4px; font-size: 9px; font-weight: 700; border-radius: 8px; margin-left: 4px; }
        .badge-red { background: var(--red); color: white; }
        .badge-yellow { background: var(--yellow); color: #000; }
        .badge-blue { background: var(--blue); color: white; }

        /* === CONTENT === */
        .content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .tab-content { display: none; padding: 12px 16px 80px; }
        .tab-content.active { display: block; }

        /* === CARDS === */
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
        .section-divider { height: 1px; background: var(--border); margin: 14px 0; }

        /* === ACTION ITEMS === */
        .action-card { background: var(--bg2); border-radius: 10px; padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--border); cursor: pointer; transition: background 0.15s; }
        .action-card:active { background: var(--bg3); }
        .action-card.priority-urgent { border-left-color: var(--red); }
        .action-card.priority-high { border-left-color: var(--orange); }
        .action-card.priority-medium { border-left-color: var(--yellow); }
        .action-card.priority-low { border-left-color: var(--blue); }
        .action-card.priority-info { border-left-color: var(--text3); }
        .action-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .action-type { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
        .type-entry { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .type-exit { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
        .type-verify { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
        .type-monitor { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
        .type-warning { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
        .type-review { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
        .action-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
        .action-meta { font-size: 11px; color: var(--text3); margin-top: 4px; }
        .action-detail { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.5; display: none; }
        .action-card.expanded .action-detail { display: block; }
        .action-time { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

        /* === POSITION MONITORS === */
        .monitor-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
        .monitor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .monitor-ticker { font-weight: 700; font-size: 14px; color: var(--text); }
        .monitor-pnl { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
        .monitor-type { font-size: 11px; color: var(--text3); }
        .monitor-bar-container { position: relative; height: 6px; background: var(--bg); border-radius: 3px; margin: 8px 0 4px; overflow: visible; }
        .monitor-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .monitor-marker { position: absolute; top: -3px; width: 2px; height: 12px; border-radius: 1px; }
        .monitor-labels { display: flex; justify-content: space-between; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
        .monitor-sl { color: var(--red); } .monitor-tp { color: var(--green); } .monitor-current { color: var(--cyan); }
        .monitor-notes { font-size: 11px; color: var(--text3); margin-top: 6px; font-style: italic; }

        /* === CHANGE FEED === */
        .change-feed { position: relative; padding-left: 20px; }
        .change-feed::before { content: ''; position: absolute; left: 5px; top: 0; bottom: 0; width: 1px; background: var(--border); }
        .change-item { position: relative; padding: 8px 0 12px 12px; }
        .change-dot { position: absolute; left: -19px; top: 12px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--bg); }
        .change-dot.trade { background: var(--green); } .change-dot.alert { background: var(--yellow); }
        .change-dot.risk { background: var(--red); } .change-dot.flow { background: var(--blue); }
        .change-dot.score { background: var(--purple); } .change-dot.market { background: var(--cyan); }
        .change-dot.position { background: var(--orange); }
        .change-time { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: 2px; }
        .change-text { font-size: 12px; color: var(--text); line-height: 1.5; }
        .change-source { font-size: 10px; color: var(--text3); margin-top: 2px; }

        /* === FLOW CARDS === */
        .flow-filters { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .flow-filters::-webkit-scrollbar { display: none; }
        .flow-chip { padding: 5px 12px; font-size: 11px; font-weight: 600; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text3); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
        .flow-chip.active { background: var(--cyan-bg); color: var(--cyan); border-color: var(--cyan); }
        .flow-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
        .flow-card-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; }
        .flow-card-header:active { background: var(--bg3); }
        .flow-left { flex: 1; }
        .flow-ticker { font-weight: 700; font-size: 15px; }
        .flow-setup { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .flow-premium { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
        .flow-right { text-align: right; flex-shrink: 0; }
        .flow-score { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; }
        .flow-tier { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .tier-a { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .tier-b { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
        .tier-skip { background: rgba(100,116,139,0.15); color: var(--text3); border: 1px solid rgba(100,116,139,0.3); }
        .flow-body { display: none; border-top: 1px solid var(--border); padding: 12px; }
        .flow-card.expanded .flow-body { display: block; }
        .flow-section-title { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; margin: 10px 0 6px; }
        .flow-section-title:first-child { margin-top: 0; }
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 6px; border-radius: 4px; font-size: 11px; }
        .score-row:nth-child(odd) { background: rgba(15,23,42,0.5); }
        .score-label { color: var(--text2); } .score-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        .chain-rec { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-top: 8px; }
        .chain-row { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; }
        .chain-label { color: var(--text3); } .chain-val { color: var(--text); font-family: 'JetBrains Mono', monospace; }
        .flow-status-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px; letter-spacing: 0.3px; }
        .status-filled { background: var(--green-bg); color: var(--green); } .status-pending { background: var(--yellow-bg); color: var(--yellow); }
        .status-queued { background: var(--blue-bg); color: var(--blue); } .status-skipped { background: rgba(100,116,139,0.15); color: var(--text3); }
        .status-watching { background: var(--purple-bg); color: var(--purple); }
        .skip-reason { font-size: 12px; color: var(--text2); padding: 8px; background: rgba(239,68,68,0.06); border-radius: 6px; border-left: 2px solid var(--red); }

        /* === OVERVIEW === */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
        .stat-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; margin-top: 2px; }
        .stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
        .progress-bar { height: 4px; background: var(--bg); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        .budget-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(30,41,59,0.5); }
        .budget-row:last-child { border-bottom: none; }

        /* === POSITIONS === */
        .pos-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
        .pos-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .pos-ticker { font-weight: 700; font-size: 16px; }
        .pos-type { font-size: 11px; color: var(--text3); }
        .pos-size { font-size: 11px; color: var(--text2); }
        .pos-pnl { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; text-align: right; }
        .pos-pnl-pct { font-size: 11px; }
        .pos-notes { font-size: 11px; color: var(--text3); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }

        /* === PERFORMANCE === */
        .perf-stat-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .perf-stat { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .perf-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
        .perf-stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }
        .chart-container { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; height: 200px; position: relative; }
        .chart-container canvas { width: 100% !important; height: 100% !important; }
        .trade-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
        .trade-row:nth-child(odd) { background: var(--bg2); }
        .trade-ticker { font-weight: 600; min-width: 40px; } .trade-type { color: var(--text3); flex: 1; margin: 0 8px; }
        .trade-pnl { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        .tier-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tier-table th { text-align: left; color: var(--text3); font-size: 10px; font-weight: 600; letter-spacing: 0.5px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
        .tier-table td { padding: 6px 8px; border-bottom: 1px solid rgba(30,41,59,0.3); }
        .tier-table td:first-child { font-weight: 600; }

        /* === WATCHLIST === */
        .wl-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
        .wl-card:active { background: var(--bg3); }
        .wl-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .wl-ticker { font-weight: 700; font-size: 15px; }
        .wl-setup { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .wl-source { font-size: 10px; color: var(--text3); margin-top: 2px; }
        .wl-right { text-align: right; }
        .wl-score { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }
        .wl-risk { font-size: 11px; color: var(--text3); margin-top: 2px; }
        .wl-status { font-size: 10px; font-weight: 600; margin-top: 4px; }

        /* === CATALYSTS === */
        .catalyst-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(30,41,59,0.4); }
        .catalyst-row:last-child { border-bottom: none; }
        .catalyst-date { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; min-width: 55px; flex-shrink: 0; }
        .catalyst-icon { font-size: 14px; flex-shrink: 0; }
        .catalyst-text { font-size: 12px; color: var(--text2); }
        .catalyst-ticker { font-weight: 600; color: var(--text); }

        /* === 0DTE SCORE === */
        .score-display { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
        .score-big { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 800; text-align: center; }
        .score-direction { text-align: center; font-size: 12px; color: var(--text2); margin-top: 2px; }
        .score-factors { margin-top: 10px; }

        /* === UTILITIES === */
        .mono { font-family: 'JetBrains Mono', monospace; }
        .text-green { color: var(--green); } .text-red { color: var(--red); } .text-yellow { color: var(--yellow); }
        .text-blue { color: var(--blue); } .text-cyan { color: var(--cyan); } .text-muted { color: var(--text3); }
        .text-center { text-align: center; } .mt-8 { margin-top: 8px; } .mb-8 { margin-bottom: 8px; }
        .empty-state { text-align: center; padding: 32px 16px; color: var(--text3); }
        .empty-state-icon { font-size: 32px; margin-bottom: 8px; }
        .empty-state-text { font-size: 13px; }
        .chevron { transition: transform 0.2s; display: inline-block; color: var(--text3); font-size: 12px; }
        .expanded .chevron { transform: rotate(90deg); }

        @media (min-width: 768px) {
            .stat-grid { grid-template-columns: repeat(4, 1fr); }
            .score-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <div>
                <span class="logo">RAYMON</span><span class="pulse-dot"></span>
                <div class="timestamp" id="lastUpdated"></div>
            </div>
            <div class="header-right">
                <div class="equity-badge" id="headerEquity"></div>
            </div>
        </div>
        <div class="header-ticker-row" id="tickerRow"></div>
        <div class="tab-bar" id="tabBar">
            <button class="tab-btn active" data-tab="actions">Actions <span class="badge badge-red" id="actionBadge"></span></button>
            <button class="tab-btn" data-tab="overview">Overview</button>
            <button class="tab-btn" data-tab="flow">Flow <span class="badge badge-blue" id="flowBadge"></span></button>
            <button class="tab-btn" data-tab="positions">Positions</button>
            <button class="tab-btn" data-tab="performance">Performance</button>
            <button class="tab-btn" data-tab="watchlist">Watchlist <span class="badge badge-yellow" id="wlBadge"></span></button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <!-- ACTIONS TAB -->
        <div class="tab-content active" id="tab-actions"></div>
        <!-- OVERVIEW TAB -->
        <div class="tab-content" id="tab-overview"></div>
        <!-- FLOW TAB -->
        <div class="tab-content" id="tab-flow"></div>
        <!-- POSITIONS TAB -->
        <div class="tab-content" id="tab-positions"></div>
        <!-- PERFORMANCE TAB -->
        <div class="tab-content" id="tab-performance"></div>
        <!-- WATCHLIST TAB -->
        <div class="tab-content" id="tab-watchlist"></div>
    </div>

// === UTILITIES ===
const $ = id => document.getElementById(id);
const pnlColor = v => v > 0 ? 'text-green' : v < 0 ? 'text-red' : 'text-muted';
const pnlSign = v => v > 0 ? '+' : '';
const fmtPnl = v => `${pnlSign(v)}$${Math.abs(v).toLocaleString()}`;
const fmtPct = v => `${pnlSign(v)}${v.toFixed(1)}%`;
const fmtMoney = v => `$${v.toLocaleString()}`;
const fmtPrem = v => {
    if (v >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
    if (v >= 1e3) return `$${(v/1e3).toFixed(0)}K`;
    return `$${v}`;
};
const timeAgo = ts => {
    if (!ts) return '';
    const d = new Date(ts), now = new Date(), diff = (now - d) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
};
const shortTime = ts => {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
};

// === HEADER ===
function renderHeader() {
    const m = D.meta || {};
    $('lastUpdated').textContent = m.last_updated ? timeAgo(m.last_updated) : '';
    const a = D.account || {};
    $('headerEquity').textContent = a.equity ? fmtMoney(a.equity) : '';

    const mk = D.market || {};
    $('tickerRow').innerHTML = [
        { label: 'SPY', value: mk.spy_price, change: mk.spy_change_pct },
        { label: 'VIX', value: mk.vix, tier: mk.vix_tier },
        { label: 'P/C', value: mk.pc_ratio },
        { label: 'TREND', value: mk.trend }
    ].map(t => {
        let cls = 'flat';
        let val = t.value || '—';
        if (t.change !== undefined) cls = t.change >= 0 ? 'up' : 'down';
        if (t.label === 'VIX') cls = (t.value || 0) >= 25 ? 'down' : (t.value || 0) >= 18 ? 'text-yellow' : 'up';
        if (t.label === 'TREND') cls = val === 'BULLISH' ? 'up' : val === 'BEARISH' ? 'down' : 'flat';
        let sub = '';
        if (t.change !== undefined) sub = ` <span style="font-size:10px">${fmtPct(t.change)}</span>`;
        if (t.tier) sub = ` <span style="font-size:9px;color:var(--text3)">${t.tier}</span>`;
        return `<div class="ticker-item"><div class="ticker-label">${t.label}</div><div class="ticker-value ${cls}">${val}${sub}</div></div>`;
    }).join('');
}

        html += `<div class="score-display">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span class="card-title">0DTE SCORE</span>
                <span class="action-time">${score.timestamp ? shortTime(score.timestamp) : ''}</span>
            </div>
            <div class="score-big ${scColor}">${pnlSign(sc)}${sc.toFixed(1)}</div>
            <div class="score-direction">${score.direction || (sc > 0 ? 'BULLISH' : sc < 0 ? 'BEARISH' : 'NEUTRAL')} — ${score.tier || (Math.abs(sc) >= 5 ? 'Tier A' : Math.abs(sc) >= 3 ? 'Tier B' : 'SKIP')}</div>
            ${score.factors ? `<div class="score-factors"><div class="score-grid">${score.factors.map(f =>

            ).join('')}</div></div>` : ''}
        </div>`;
    }

        html += `<div class="card-title" style="margin:14px 0 8px">ACTIVITY LOG</div>`;
        html += `<div class="change-feed">${changes.slice(0, 30).map(renderChangeItem).join('')}</div>`;
    }

    if (!actions.length && !changes.length && !positions.length && !score) {
        html = `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">No pending actions. Waiting for next scheduled task.</div></div>`;
    }

    $('tab-actions').innerHTML = html;

    // Badge
    const badge = $('actionBadge');
    const count = urgentActions.length;
    badge.textContent = count || '';
    badge.style.display = count ? 'inline-flex' : 'none';
}

function renderActionCard(a) {
    const typeClass = `type-${a.type || 'monitor'}`;
    const prioClass = `priority-${a.priority || 'medium'}`;
    return `<div class="action-card ${prioClass}" onclick="this.classList.toggle('expanded')">
        <div class="action-top">
            <span class="action-type ${typeClass}">${(a.type || 'INFO').toUpperCase()}</span>
            <span class="action-title">${a.title || ''}</span>
            <span class="action-time">${a.timestamp ? shortTime(a.timestamp) : ''}</span>
        </div>
        <div class="action-meta">${a.ticker ? `<strong>${a.ticker}</strong> — ` : ''}${a.summary || ''}</div>
        ${a.detail ? `<div class="action-detail">${a.detail}</div>` : ''}
    </div>`;
}

function renderMonitorCard(p) {
    const pnl = p.pnl || 0;
    const pnlPct = p.pnl_pct || 0;
    const color = pnl >= 0 ? 'text-green' : 'text-red';
    // SL/TP bar visualization
    let barHtml = '';
    if (p.entry && p.current_price) {
        const entry = parseFloat(p.entry);
        const current = parseFloat(p.current_price || p.mark || entry);
        const pctFromEntry = ((current - entry) / entry * 100);
        // Simple color bar based on P&L
        const barColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const barWidth = Math.min(Math.abs(pnlPct), 100);
        barHtml = `<div class="monitor-bar-container">
            <div class="monitor-bar-fill" style="width:${barWidth}%;background:${barColor}"></div>
        </div>
        <div class="monitor-labels">
            <span class="monitor-sl">Entry: ${p.type === 'shares' ? '$'+entry.toFixed(2) : '$'+entry.toFixed(2)}</span>
            <span class="monitor-current">${pnl >= 0 ? '▲' : '▼'} ${Math.abs(pnlPct).toFixed(1)}%</span>
        </div>`;
    }
    return `<div class="monitor-card">
        <div class="monitor-header">
            <div>
                <span class="monitor-ticker">${p.status || ''} ${p.ticker}</span>
                <div class="monitor-type">${p.type || ''} ${p.size || ''}</div>
            </div>
            <div class="monitor-pnl ${color}">${fmtPnl(pnl)} <span class="pos-pnl-pct">(${fmtPct(pnlPct)})</span></div>
        </div>
        ${barHtml}
        ${p.notes ? `<div class="monitor-notes">${p.notes}</div>` : ''}
    </div>`;
}

function renderChangeItem(c) {
    return `<div class="change-item">
        <div class="change-dot ${c.type || 'market'}"></div>
        <div class="change-time">${c.timestamp ? shortTime(c.timestamp) : ''} ${c.source ? `· ${c.source}` : ''}</div>
        <div class="change-text">${c.text || ''}</div>
    </div>`;
}

// === FLOW TAB ===
let flowFilter = 'all';
function renderFlow() {
    const flows = D.flow_alerts || [];
    let html = '';

    // Filters
    const statuses = ['all', 'filled', 'pending', 'queued', 'watching', 'skipped'];
    html += `<div class="flow-filters">${statuses.map(s =>
        `<span class="flow-chip ${flowFilter === s ? 'active' : ''}" onclick="flowFilter='${s}';renderFlow()">${s.toUpperCase()}${s !== 'all' ? ` (${flows.filter(f => s === 'all' || (f.status||'').toLowerCase() === s).length})` : ''}</span>`
    ).join('')}</div>`;

    const filtered = flowFilter === 'all' ? flows : flows.filter(f => (f.status||'').toLowerCase() === flowFilter);

    if (filtered.length === 0) {
        html += `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No flow alerts${flowFilter !== 'all' ? ' matching filter' : ''}. Waiting for next scan.</div></div>`;
    } else {
        html += filtered.map((f, i) => renderFlowCard(f, i)).join('');
    }

    $('tab-flow').innerHTML = html;
    const badge = $('flowBadge');
    const actionableCount = flows.filter(f => ['filled','pending','queued'].includes((f.status||'').toLowerCase())).length;
    badge.textContent = actionableCount || '';
    badge.style.display = actionableCount ? 'inline-flex' : 'none';
}

function renderFlowCard(f, idx) {
    const sc = f.score;
    const scColor = sc !== null && sc !== undefined ? (Math.abs(sc) >= 5 ? 'text-green' : Math.abs(sc) >= 3 ? 'text-yellow' : 'text-muted') : 'text-muted';
    const tierClass = f.tier === 'A' ? 'tier-a' : f.tier === 'B' ? 'tier-b' : 'tier-skip';
    const statusClass = `status-${(f.status||'pending').toLowerCase()}`;

    let body = '';

    // Score breakdown
    if (f.factors && f.factors.length > 0) {
        body += `<div class="flow-section-title">SCORE BREAKDOWN</div><div class="score-grid">`;
        body += f.factors.map(fa => `<div class="score-row"><span class="score-label">${fa.name}</span><span class="score-val ${fa.value > 0 ? 'text-green' : fa.value < 0 ? 'text-red' : 'text-muted'}">${pnlSign(fa.value)}${fa.value}</span></div>`).join('');
        if (f.modifiers && f.modifiers.length > 0) {
            body += f.modifiers.map(m => `<div class="score-row" style="background:var(--purple-bg)"><span class="score-label">${m.name}</span><span class="score-val ${m.value > 0 ? 'text-green' : m.value < 0 ? 'text-red' : 'text-muted'}">${pnlSign(m.value)}${m.value}</span></div>`).join('');
        }
        body += `</div>`;
    }

    // Analysis notes
    if (f.analysis) {
        body += `<div class="flow-section-title">ANALYSIS</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${f.analysis}</div>`;
    }

    // Chain rec
    if (f.chain_rec) {
        const cr = f.chain_rec;
        body += `<div class="flow-section-title">CHAIN REC</div><div class="chain-rec">`;
        const fields = [
            ['Setup', cr.setup], ['Entry', cr.entry], ['SL', cr.sl], ['TP1', cr.tp1], ['TP2', cr.tp2],
            ['BE', cr.be], ['Risk', cr.risk], ['R/R', cr.rr], ['Delta', cr.delta], ['Theta', cr.theta],
            ['IV Rank', cr.iv_rank], ['Max Pain', cr.max_pain], ['Expiry', cr.expiry], ['Time Stop', cr.time_stop]
        ];
        body += fields.filter(([,v]) => v !== undefined && v !== null && v !== '').map(([l,v]) =>
            `<div class="chain-row"><span class="chain-label">${l}</span><span class="chain-val">${v}</span></div>`
        ).join('');
        body += `</div>`;
    }

    // Skip reason
    if (f.skip_reason) {
        body += `<div class="flow-section-title">SKIP REASON</div><div class="skip-reason">${f.skip_reason}</div>`;
    }

    return `<div class="flow-card" id="flow-${idx}" onclick="document.getElementById('flow-${idx}').classList.toggle('expanded')">
        <div class="flow-card-header">
            <div class="flow-left">
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="flow-ticker">${f.ticker||''}</span>
                    <span class="flow-status-badge ${statusClass}">${(f.status||'PENDING').toUpperCase()}</span>
                </div>
                <div class="flow-setup">${f.setup||f.type||''}</div>
                <div class="flow-premium">${f.premium ? fmtPrem(f.premium) : ''} ${f.direction||''} ${f.source ? `· ${f.source}` : ''}</div>
            </div>
            <div class="flow-right">
                ${sc !== null && sc !== undefined ? `<div class="flow-score ${scColor}">${pnlSign(sc)}${Math.abs(sc).toFixed(1)}</div>` : ''}
                ${f.tier ? `<div class="flow-tier ${tierClass}">TIER ${f.tier}</div>` : ''}
                <div class="chevron" style="margin-top:4px">▶</div>
            </div>
        </div>
        <div class="flow-body">${body}</div>
    </div>`;
}

            return `<div class="pos-card">
                <div class="pos-header">
                    <div>
                        <div class="pos-ticker">${p.status||''} ${p.ticker||''}</div>
                        <div class="pos-type">${p.type||''}</div>
                        <div class="pos-size">${p.size||''} @ $${p.entry||'—'}</div>

// === PERFORMANCE TAB ===
let equityChart = null;
function renderPerformance() {
    const perf = D.performance || {};
    const trades = D.trades || [];
    const stats = perf.stats || {};

    let html = '';

    // Top stats
    const totalPnl = trades.reduce((s, t) => s + (t.pnl || 0), 0);
    const wins = trades.filter(t => t.result === 'WIN').length;
    const losses = trades.filter(t => t.result === 'LOSS').length;
    const winRate = (wins + losses) > 0 ? (wins / (wins + losses) * 100) : 0;

    html += `<div class="perf-stat-row">
        <div class="perf-stat"><div class="perf-stat-val ${pnlColor(totalPnl)}">${fmtPnl(totalPnl)}</div><div class="perf-stat-label">Total P&L</div></div>
        <div class="perf-stat"><div class="perf-stat-val">${wins}W/${losses}L</div><div class="perf-stat-label">${winRate.toFixed(0)}% Win Rate</div></div>
    </div>`;

    // Equity chart
    html += `<div class="chart-container"><canvas id="equityChart"></canvas></div>`;

    // Tier breakdown
    html += `<div class="card"><div class="card-title" style="margin-bottom:8px">TIER PERFORMANCE</div><table class="tier-table">
        <tr><th>TIER</th><th>W/L</th><th>WIN %</th><th>P&L</th></tr>`;
    for (const [key, label] of [['dte_tier_a','0DTE A'],['dte_tier_b','0DTE B'],['swing_tier_a','Swing A'],['swing_tier_b','Swing B']]) {
        const s = stats[key] || {};
        const w = s.wins||0, l = s.losses||0, total = w+l;
        const wr = total > 0 ? (w/total*100).toFixed(0) : '—';
        html += `<tr><td>${label}</td><td>${w}/${l}</td><td>${wr}${wr !== '—' ? '%' : ''}</td><td class="${pnlColor(s.total_pnl||0)}">${fmtPnl(s.total_pnl||0)}</td></tr>`;
    }
    html += `</table></div>`;

    // Weekly P&L
    const weeklyHist = perf.weekly_pnl_history || [];
    if (weeklyHist.length > 0) {
        html += `<div class="card"><div class="card-title" style="margin-bottom:8px">WEEKLY P&L</div>`;
        html += weeklyHist.map(w => `<div class="budget-row">
            <span class="text-muted" style="font-size:12px">${w.week}</span>
            <span class="mono ${pnlColor(w.pnl)}" style="font-size:13px;font-weight:600">${fmtPnl(w.pnl)}</span>
        </div>`).join('');
        html += `</div>`;
    }

    // Recent trades
    html += `<div class="card"><div class="card-title" style="margin-bottom:8px">RECENT TRADES</div>`;
    if (trades.length === 0) {
        html += `<div class="text-muted text-center" style="padding:16px">No trades logged yet.</div>`;
    } else {
        html += trades.slice(0, 15).map(t => `<div class="trade-row">
            <span class="trade-ticker">${t.ticker||''}</span>
            <span class="trade-type">${t.type||''} ${t.tier ? `(${t.tier})` : ''}</span>
            <span class="trade-pnl ${pnlColor(t.pnl||0)}">${fmtPnl(t.pnl||0)}</span>
        </div>`).join('');
    }
    html += `</div>`;

    $('tab-performance').innerHTML = html;

    // Draw equity chart
    setTimeout(() => {
        const ctx = document.getElementById('equityChart');
        if (!ctx) return;
        if (equityChart) equityChart.destroy();
        const eqHist = perf.equity_history || [];
        equityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: eqHist.map(h => h.date),
                datasets: [{
                    data: eqHist.map(h => h.equity),
                    borderColor: '#06b6d4',
                    backgroundColor: 'rgba(6,182,212,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2,
                    pointBackgroundColor: '#06b6d4',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: {
                    callbacks: { label: ctx => `$${ctx.parsed.y.toLocaleString()}` }
                }},
                scales: {
                    x: { grid: { color: 'rgba(30,41,59,0.5)' }, ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 0, maxTicksLimit: 5 } },
                    y: { grid: { color: 'rgba(30,41,59,0.5)' }, ticks: { color: '#64748b', font: { size: 10 }, callback: v => `$${(v/1000).toFixed(1)}K` } }
                }
            }
        });
    }, 50);
}

// === WATCHLIST TAB ===
function renderWatchlist() {
    const wl = D.watchlist || [];
    let html = '';

    if (wl.length === 0) {
        html = `<div class="empty-state"><div class="empty-state-icon">👁️</div><div class="empty-state-text">No watchlist items. Waiting for evening playbook.</div></div>`;
    } else {
        // Sort: Tier A first, then B, then score magnitude
        const sorted = [...wl].sort((a, b) => {
            if (a.tier === 'A' && b.tier !== 'A') return -1;
            if (b.tier === 'A' && a.tier !== 'A') return 1;
            return Math.abs(b.score || 0) - Math.abs(a.score || 0);
        });

        html += `<div class="card-title" style="margin-bottom:8px">${wl.length} CANDIDATES</div>`;
        html += sorted.map(w => {
            const sc = w.score;
            const scColor = sc !== null && sc !== undefined ? (Math.abs(sc) >= 4 ? 'text-green' : Math.abs(sc) >= 3 ? 'text-yellow' : 'text-muted') : 'text-muted';
            const tierClass = w.tier === 'A' ? 'tier-a' : w.tier === 'B' ? 'tier-b' : 'tier-skip';
            return `<div class="wl-card">
                <div class="wl-header">
                    <div>
                        <div style="display:flex;align-items:center;gap:8px">
                            <span class="wl-ticker">${w.ticker||''}</span>
                            ${w.tier ? `<span class="flow-tier ${tierClass}" style="font-size:9px">TIER ${w.tier}</span>` : ''}
                        </div>
                        <div class="wl-setup">${w.setup||''}</div>
                        <div class="wl-source">${w.source||''}</div>
                    </div>
                    <div class="wl-right">
                        ${sc !== null && sc !== undefined ? `<div class="wl-score ${scColor}">${pnlSign(sc)}${Math.abs(sc).toFixed(1)}</div>` : ''}
                        <div class="wl-risk text-muted">${w.risk ? (typeof w.risk === 'number' ? fmtMoney(w.risk) : w.risk) : ''}</div>
                        <div class="wl-status ${w.status === 'QUEUED' ? 'text-yellow' : 'text-muted'}">${w.status||''}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    $('tab-watchlist').innerHTML = html;
    const badge = $('wlBadge');
    const tierACount = wl.filter(w => w.tier === 'A').length;
    badge.textContent = tierACount || '';
    badge.style.display = tierACount ? 'inline-flex' : 'none';
}

// === TAB SWITCHING ===
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById(`tab-${tab}`).classList.add('active');
        // Lazy render
        if (tab === 'performance') renderPerformance();
    });
});

// === INIT ===
renderHeader();
renderActions();
renderOverview();
renderFlow();
renderPositions();
renderWatchlist();
// Performance is lazy-loaded on tab click
</script>
</body>
</html>
